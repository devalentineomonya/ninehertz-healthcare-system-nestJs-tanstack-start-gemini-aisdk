name: Ping Supabase to Keep Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Echo start time
        run: echo "Starting Supabase ping at $(date -u) UTC"

      - name: Ping Supabase keep-alive endpoint
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          curl -sS "${SUPABASE_URL}/rest/v1/ping_logs?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}"

      - name: Done
        run: echo "Finished Supabase ping at $(date -u) UTC"

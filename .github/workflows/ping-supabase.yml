name: Ping Supabase to Keep Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Echo start time
        run: echo "Starting Supabase ping at $(date -u) UTC"

      - name: Ping Supabase (PostgREST)
        env:
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          set -e
          curl -sS \
            "${SUPABASE_PROJECT_URL}/rest/v1/ping_logs?select=id&limit=1" \
            -H "apikey: ${SUPABASE_PUBLISHABLE_KEY}" \
            -H "Content-Type: application/json"

      - name: Done
        run: echo "Finished Supabase ping at $(date -u) UTC"
